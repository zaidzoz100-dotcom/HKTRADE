openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: prices
    description: Live gold, silver, and forex prices
  - name: alerts
    description: Custom price alerts
  - name: account
    description: Authenticated account and subscription status
  - name: admin
    description: Admin-only user management, protected by an admin password
  - name: push
    description: Web Push subscription management for background alert notifications
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /prices:
    get:
      operationId: getPrices
      tags: [prices]
      summary: Get current gold, silver, and forex prices
      responses:
        "200":
          description: Current price snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceSnapshot"
  /account:
    get:
      operationId: getAccount
      tags: [account]
      summary: Get the current user's account and subscription status
      description: Creates the account record on first call (JIT provisioning).
      responses:
        "200":
          description: Account status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountStatus"
        "401":
          description: Not authenticated
  /account/referral:
    post:
      operationId: applyReferral
      tags: [account]
      summary: Redeem a referral code, rewarding the referrer with extra trial days
      description: A user may redeem at most one referral code, and only if they haven't already redeemed one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyReferralInput"
      responses:
        "200":
          description: Updated account status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountStatus"
        "400":
          description: Invalid code, self-referral, or already redeemed
        "401":
          description: Not authenticated
  /account/profile:
    post:
      operationId: completeProfile
      tags: [account]
      summary: Submit the mandatory registration profile (country + phone number)
      description: >
        Required once per account before full dashboard access is granted.
        Also the point at which a pending referral reward is paid out to the
        referrer, once this user's email is verified and their profile is
        complete.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteProfileInput"
      responses:
        "200":
          description: Updated account status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountStatus"
        "400":
          description: Invalid country or phone number
        "401":
          description: Not authenticated
  /account/favorites:
    patch:
      operationId: updateFavoriteAssets
      tags: [account]
      summary: Set the asset symbols shown as market cards on the dashboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFavoriteAssetsInput"
      responses:
        "200":
          description: Updated account status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountStatus"
        "400":
          description: Invalid selection
        "401":
          description: Not authenticated
  /assets:
    get:
      operationId: getAssets
      tags: [prices]
      summary: List every asset available for tracking and favoriting
      responses:
        "200":
          description: All available assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetInfo"
  /push/vapid-public-key:
    get:
      operationId: getPushVapidPublicKey
      tags: [push]
      summary: Get the VAPID public key needed to create a browser PushSubscription
      responses:
        "200":
          description: VAPID public key, or null if push notifications aren't configured on this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VapidPublicKeyResponse"
  /push/subscribe:
    post:
      operationId: subscribePush
      tags: [push]
      summary: Register a browser PushSubscription for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscribeInput"
      responses:
        "204":
          description: Subscribed
        "400":
          description: Invalid subscription payload
        "401":
          description: Not authenticated
  /push/unsubscribe:
    post:
      operationId: unsubscribePush
      tags: [push]
      summary: Remove a browser PushSubscription (opt out on this device)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushUnsubscribeInput"
      responses:
        "204":
          description: Unsubscribed
        "401":
          description: Not authenticated
  /push/expo-token:
    post:
      operationId: registerExpoPushToken
      tags: [push]
      summary: Register an Expo push token for the current user (native mobile app)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterExpoPushTokenInput"
      responses:
        "204":
          description: Registered
        "400":
          description: Invalid token payload
        "401":
          description: Not authenticated
  /push/expo-token/unregister:
    post:
      operationId: unregisterExpoPushToken
      tags: [push]
      summary: Remove an Expo push token (opt out on this device)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterExpoPushTokenInput"
      responses:
        "204":
          description: Unregistered
        "401":
          description: Not authenticated
  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List all alerts
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
    post:
      operationId: createAlert
      tags: [alerts]
      summary: Create a new price alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "403":
          description: Subscription required (trial expired and not premium)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionRequiredError"
  /alerts/triggered:
    get:
      operationId: listTriggeredAlerts
      tags: [alerts]
      summary: List alerts currently triggered and awaiting acknowledgement
      responses:
        "200":
          description: List of triggered alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
  /alerts/{id}:
    patch:
      operationId: updateAlert
      tags: [alerts]
      summary: Update an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertUpdate"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          description: Not found
    delete:
      operationId: deleteAlert
      tags: [alerts]
      summary: Delete an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge (dismiss) a triggered alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Acknowledged alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          description: Not found
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List users for the admin panel, optionally filtered by email
      security:
        - adminPassword: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive email substring filter
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "401":
          description: Missing or invalid admin password
  /admin/users/{clerkUserId}:
    patch:
      operationId: adminUpdateUserPlan
      tags: [admin]
      summary: Manually set a user's plan and active/expired status
      security:
        - adminPassword: []
      parameters:
        - name: clerkUserId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdatePlanInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Missing or invalid admin password
        "404":
          description: User not found
components:
  securitySchemes:
    adminPassword:
      type: apiKey
      in: header
      name: x-admin-password
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MetalPrice:
      type: object
      properties:
        symbol:
          type: string
          description: "Metal ticker, e.g. XAU, XAG"
        name:
          type: string
        price:
          type: number
        currency:
          type: string
      required: [symbol, name, price, currency]
    ForexRate:
      type: object
      properties:
        pair:
          type: string
          description: "Currency pair, e.g. EUR/USD"
        rate:
          type: number
      required: [pair, rate]
    CryptoPrice:
      type: object
      properties:
        symbol:
          type: string
          description: "Crypto ticker, e.g. BTC, ETH"
        name:
          type: string
        price:
          type: number
          description: "Price in USD"
      required: [symbol, name, price]
    PriceSnapshot:
      type: object
      properties:
        updatedAt:
          type: string
          format: date-time
        metals:
          type: array
          items:
            $ref: "#/components/schemas/MetalPrice"
        forex:
          type: array
          items:
            $ref: "#/components/schemas/ForexRate"
        crypto:
          type: array
          items:
            $ref: "#/components/schemas/CryptoPrice"
        stale:
          type: boolean
          description: "True if the last upstream price fetch failed and this is a cached snapshot"
      required: [updatedAt, metals, forex, crypto, stale]
    AssetInfo:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [metal, forex, crypto]
      required: [symbol, name, category]
    VapidPublicKeyResponse:
      type: object
      properties:
        publicKey:
          type: ["string", "null"]
          description: "Base64url VAPID public key, or null if push isn't configured on this server"
      required: [publicKey]
    PushSubscriptionKeys:
      type: object
      properties:
        p256dh:
          type: string
        auth:
          type: string
      required: [p256dh, auth]
    PushSubscribeInput:
      type: object
      properties:
        endpoint:
          type: string
        keys:
          $ref: "#/components/schemas/PushSubscriptionKeys"
      required: [endpoint, keys]
    PushUnsubscribeInput:
      type: object
      properties:
        endpoint:
          type: string
      required: [endpoint]
    RegisterExpoPushTokenInput:
      type: object
      properties:
        token:
          type: string
          description: "Expo push token (e.g. ExponentPushToken[...]) from expo-notifications"
      required: [token]
    UpdateFavoriteAssetsInput:
      type: object
      properties:
        favoriteAssets:
          type: array
          items:
            type: string
          description: "Asset symbols to show as market cards; must be non-empty and match known symbols from /assets"
      required: [favoriteAssets]
    Alert:
      type: object
      properties:
        id:
          type: integer
        assetSymbol:
          type: string
          description: "XAU, XAG, EUR/USD, GBP/USD, USD/JPY"
        assetLabel:
          type: string
          description: "Human readable label, e.g. Gold (XAU)"
        targetPrice:
          type: number
        direction:
          type: string
          enum: [above, below]
        status:
          type: string
          enum: [active, triggered, acknowledged, disabled]
        note:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        triggeredAt:
          type: ["string", "null"]
          format: date-time
        acknowledgedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - assetSymbol
        - assetLabel
        - targetPrice
        - direction
        - status
        - note
        - createdAt
        - triggeredAt
        - acknowledgedAt
    AlertInput:
      type: object
      properties:
        assetSymbol:
          type: string
        assetLabel:
          type: string
        targetPrice:
          type: number
        note:
          type: ["string", "null"]
      required: [assetSymbol, assetLabel, targetPrice]
    AlertUpdate:
      type: object
      properties:
        targetPrice:
          type: number
        direction:
          type: string
          enum: [above, below]
        note:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, disabled]
    AccountStatus:
      type: object
      properties:
        isPremium:
          type: boolean
        plan:
          type: string
          enum: [trial, monthly, yearly]
        planStatus:
          type: string
          enum: [active, expired]
        trialStartedAt:
          type: string
          format: date-time
        trialEndsAt:
          type: string
          format: date-time
        premiumExpiresAt:
          type: ["string", "null"]
          format: date-time
        daysRemaining:
          type: integer
          description: "Days left in the free trial, 0 if expired or premium"
        canCreateAlerts:
          type: boolean
        favoriteAssets:
          type: array
          items:
            type: string
          description: "Asset symbols the user has chosen to show as market cards"
        referralCode:
          type: string
          description: "This user's own shareable referral code"
        referredByCode:
          type: ["string", "null"]
          description: "The referral code this user redeemed, if any"
        referralBonusDays:
          type: integer
          description: "Extra trial days earned by referring other users (4 per successful referral)"
        isEmailVerified:
          type: boolean
          description: "Whether Clerk has verified this account's email address"
        profileComplete:
          type: boolean
          description: "Whether the mandatory country/phone registration step has been completed"
        country:
          type: ["string", "null"]
          description: "ISO 3166-1 alpha-2 country code chosen during profile completion"
        phoneNumber:
          type: ["string", "null"]
          description: "E.164 phone number (with country dial code) submitted during profile completion"
      required:
        - isPremium
        - plan
        - planStatus
        - trialStartedAt
        - trialEndsAt
        - premiumExpiresAt
        - daysRemaining
        - canCreateAlerts
        - favoriteAssets
        - referralCode
        - referredByCode
        - referralBonusDays
        - isEmailVerified
        - profileComplete
        - country
        - phoneNumber
    ApplyReferralInput:
      type: object
      properties:
        code:
          type: string
      required: [code]
    CompleteProfileInput:
      type: object
      properties:
        country:
          type: string
          description: "ISO 3166-1 alpha-2 country code"
        phoneNumber:
          type: string
          description: "Full E.164 phone number, including the country's dial code"
      required: [country, phoneNumber]
    SubscriptionRequiredError:
      type: object
      properties:
        error:
          type: string
        contactUrl:
          type: string
      required: [error, contactUrl]
    AdminUser:
      type: object
      properties:
        clerkUserId:
          type: string
        email:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        plan:
          type: string
          enum: [trial, monthly, yearly]
        planStatus:
          type: string
          enum: [active, expired]
        isPremium:
          type: boolean
        daysRemaining:
          type: integer
        premiumExpiresAt:
          type: ["string", "null"]
          format: date-time
      required:
        - clerkUserId
        - email
        - createdAt
        - plan
        - planStatus
        - isPremium
        - daysRemaining
        - premiumExpiresAt
    AdminUpdatePlanInput:
      type: object
      properties:
        action:
          type: string
          enum:
            - trial_active
            - trial_expired
            - monthly_active
            - monthly_expired
            - yearly_active
            - yearly_expired
      required: [action]

